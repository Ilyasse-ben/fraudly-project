services:
  basse-de-donnes:
    image: 'postgres:15'
    container_name: pgdb
    environment:
      - 'POSTGRES_PASSWORD=fraudly'
      - 'POSTGRES_USER=fraudly'
    networks:
      - fraoudly-networks
    volumes:
      - ./postgres-init:/docker-entrypoint-initdb.d
      - fraoudly-volumes:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - CLUSTER_ID=5L6g3nShT-eMCtK--X86sw
    networks:
      - fraoudly-networks
    ports:
      - '9094:9094'
    volumes:
      - kafka-data:/var/lib/kafka/data

  redis:
    image: redis:7
    container_name: redis
    ports:
      - '6379:6379'
    networks:
      - fraoudly-networks
    volumes:
      - redis-data:/data

  chroma:
    image: chromadb/chroma:latest
    container_name: chroma
    ports:
      - '8001:8000'
    networks:
      - fraoudly-networks
    volumes:
      - chroma-data:/chroma/chroma

 

  discavery-service:
    container_name: discavery-service
    build: ./Backend-spring/discavery-service
    ports:
      - '8761:8761'
    networks:
      - fraoudly-networks

  gateway-service:
    container_name: gateway-service
    build: ./Backend-spring/gateway-service
    ports:
      - '8888:8888'
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discavery-service:8761/eureka/
    depends_on:
      - discavery-service
    networks:
      - fraoudly-networks

  authentification-service:
    container_name: authentification-service     
    build: ./Backend-spring/authentification-service
    ports:
      - '8081:8081'
    environment:
      - DB_URL=jdbc:postgresql://pgdb:5432/fraudly_auth
      - DB_USER=fraudly
      - DB_PASSWORD=fraudly
    depends_on:
      - basse-de-donnes
      - discavery-service
    networks:
      - fraoudly-networks


    
  analytics-service:
    container_name: analytics-service      
    build: ./Backend-spring/analytics-service
    ports:
      - '8083:8083'
    environment:
      - DB_URL_ANALYTICS=jdbc:postgresql://pgdb:5432/fraudly_analytics
      - DB_USER_ANALYTICS=fraudly
      - DB_PASSWORD_ANALYTICS=fraudly
    depends_on:
      - basse-de-donnes
      - discavery-service
    networks:
      - fraoudly-networks


  proctoring-service:
    container_name: proctoring-service     
    build: ./Backend-spring/proctoring-service
    ports:
      - '8084:8084'
    depends_on:
      - basse-de-donnes
      - discavery-service
    networks:
      - fraoudly-networks


  frontend-service:
    container_name: frontend-service
    build: ./Frontend
    ports:
      - '80:80'
    networks:
      - fraoudly-networks


  learning-service:
    container_name: learning-service
    build: ./Backend-spring/learning-service
    ports:
      - '8085:8084'
    environment:
      - LEARNING_DB_URL=jdbc:postgresql://pgdb:5432/fraudly_learning
      - DB_USER=fraudly
      - DB_PASSWORD=fraudly
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_CONSUMER_GROUP=fraudly-learning-service
      - KAFKA_AUTO_OFFSET_RESET=earliest
    depends_on:
      - basse-de-donnes
      - kafka
      - discavery-service
    networks:
      - fraoudly-networks

networks: 
  fraoudly-networks:
    driver: bridge

volumes:
  fraoudly-volumes:
  kafka-data:
  redis-data:
  chroma-data:
  

 