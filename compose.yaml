services:
  
  basse-de-donnes:
    image: 'postgres:15'
    container_name: pgdb
    environment:
      - 'POSTGRES_PASSWORD=1234'
      - 'POSTGRES_USER=ilyasse'
    networks:
      - fraoudly-networks
    volumes:
      - fraoudly-volumes:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - CLUSTER_ID=5L6g3nShT-eMCtK--X86sw
    networks:
      - fraoudly-networks
    ports:
      - '9094:9094'
    volumes:
      - kafka-data:/var/lib/kafka/data
  
  redis:
    image: redis:7
    container_name: redis
    ports:
      - '6379:6379'
    networks:
      - fraoudly-networks
    volumes:
      - redis-data:/data

  authentification-service:
    container_name: authentification-service     
    build: ./Backend-Spring/authentification-service
    ports:
      - '8080:8080'
    environment:
      - DB_URL=jdbc:postgresql://pgdb:5432/mydb
    depends_on:
      - basse-de-donnes
    networks:
      - fraoudly-networks


  learning-service:
    container_name: learning-service      
    build: ./Backend-Spring/learning-service
    ports:
      - '8081:8080'
    environment:
      - DB_URL=jdbc:postgresql://pgdb:5432/mydb
    depends_on:
      - basse-de-donnes
    networks:
      - fraoudly-networks


  assessment-service:
    container_name: assessment-service      
    build: ./Backend-Spring/assessment-service
    ports:
      - '8082:8080'
    environment:
      - DB_URL=jdbc:postgresql://pgdb:5432/mydb
    depends_on:
      - basse-de-donnes
    networks:
      - fraoudly-networks


  proctoring-service:
    container_name: proctoring-service     
    build: ./Backend-Spring/proctoring-service
    ports:
      - '8083:8080'
    environment:
      - DB_URL=jdbc:postgresql://pgdb:5432/mydb
    depends_on:
      - basse-de-donnes
    networks:
      - fraoudly-networks
  frontend-service:
    container_name: frontend-service
    build: ./Frontend
    ports:
      - '80:80'
    networks:
      - fraoudly-networks
    

networks: 
  fraoudly-networks:
    driver: bridge

volumes:
  fraoudly-volumes:
  kafka-data:
  redis-data:
  

