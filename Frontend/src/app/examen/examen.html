<main class="flex-1 p-12">

    <!-- HEADER -->

    <div class="flex items-center justify-between mb-10">

        <div>

            <h1 class="text-5xl font-bold mb-3">
                Machine Learning Exam
            </h1>

            <p class="text-slate-500 text-lg">
                Answer all questions before submitting your exam
            </p>

        </div>

        <button class="px-6 py-4 rounded-2xl bg-red-500 hover:bg-red-600 transition text-white font-semibold">

            Submit Exam

        </button>

    </div>

    <!-- QUESTION CARD -->

    <div class="bg-white border border-slate-200 rounded-3xl p-10 shadow-sm">

        <!-- QUESTION NUMBER -->

        <div class="flex items-center justify-between mb-6">

            <span class="px-4 py-2 rounded-full bg-blue-50 text-blue-600 font-medium">
                Question 1 / 10
            </span>

            <span class="text-slate-500">
                5 Points
            </span>

        </div>

        <!-- QUESTION -->

        <h2 class="text-3xl font-bold leading-relaxed mb-8">

            Which algorithm is commonly used for classification tasks in supervised learning?

        </h2>

        <!-- OPTIONS -->

        <div class="space-y-5">

            <!-- OPTION -->

            <div class="option">

                <input type="radio" id="a" name="q1" class="hidden">

                <label for="a"
                    class="block border border-slate-200 rounded-2xl p-6 cursor-pointer hover:border-blue-500 transition">

                    A. K-Means Clustering

                </label>

            </div>

            <!-- OPTION -->

            <div class="option">

                <input type="radio" id="b" name="q1" class="hidden">

                <label for="b"
                    class="block border border-slate-200 rounded-2xl p-6 cursor-pointer hover:border-blue-500 transition">

                    B. Linear Regression

                </label>

            </div>

            <!-- OPTION -->

            <div class="option">

                <input type="radio" id="c" name="q1" class="hidden">

                <label for="c"
                    class="block border border-slate-200 rounded-2xl p-6 cursor-pointer hover:border-blue-500 transition">

                    C. Logistic Regression

                </label>

            </div>

            <!-- OPTION -->

            <div class="option">

                <input type="radio" id="d" name="q1" class="hidden">

                <label for="d"
                    class="block border border-slate-200 rounded-2xl p-6 cursor-pointer hover:border-blue-500 transition">

                    D. PCA

                </label>

            </div>

        </div>

        <!-- NAVIGATION -->

        <div class="flex justify-between mt-8">

            <button class="px-6 py-4 rounded-2xl border border-slate-300 hover:bg-slate-100 transition font-semibold">

                Previous

            </button>

            <button
                class="px-6 py-4 rounded-2xl bg-blue-600 hover:bg-blue-700 transition text-white font-semibold shadow-lg shadow-blue-100">

                Next Question

            </button>

        </div>

    </div>
    <div class="flex justify-between mt-4">
        <div class="bg-blue-600 rounded-3xl p-2 pr-6 pl-6 text-white">

            <p class="text-sm opacity-80 mb-2">
                Remaining Time
            </p>

            <h1 class="text-2xl text-center font-semibold">
                42:18
            </h1>
        </div>
        <div class="bg-white border border-slate-200 rounded-3xl p-2 pr-6 pl-6">
            <p class="text-sm text-slate-500 mb-2">
                Exam Duration
            </p>

            <h3 class="text-lg text-center font-semibold">
                60 Min
            </h3>
        </div>

    </div>
</main>
