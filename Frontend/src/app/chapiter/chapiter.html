<main class="flex-1 p-16 overflow-auto">

    <!-- HEADER -->

    <div class="mb-10">

        <h1 class="text-4xl font-bold mb-3">
            Create Chapter
        </h1>

        <p class="text-slate-500 text-lg">
            Add chapter content and educational resources
        </p>

    </div>

    <!-- MAIN CARD -->

    <div class="bg-white border border-slate-200 rounded-3xl p-10 max-w-7xl shadow-sm">

        <form class="space-y-10">


            <!-- TITLE -->

            <div>

                <label class="block text-sm font-semibold text-slate-700 mb-3">
                    Chapter Title
                </label>

                <input type="text" placeholder="Example: Introduction to Machine Learning"
                    class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50 focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition" />

            </div>


            <!-- DESCRIPTION -->

            <div>

                <label class="block text-sm font-semibold text-slate-700 mb-3">
                    Chapter Description
                </label>

                <textarea rows="5" placeholder="Describe the chapter content..."
                    class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50 resize-none focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition"></textarea>

            </div>

            <!-- RESOURCES HEADER -->

            <div class="flex items-center justify-between">

                <div>

                    <h2 class="text-3xl font-bold mb-2">
                        Chapter Resources
                    </h2>

                    <p class="text-slate-500">
                        Each resource is an independent object
                    </p>

                </div>

                <button type="button"
                    class="px-6 py-4 rounded-2xl bg-blue-600 hover:bg-blue-700 transition text-white font-semibold shadow-lg shadow-blue-100">

                    + Add Resource

                </button>

            </div>

            <!-- RESOURCE OBJECT -->

            <div class="border border-slate-200 rounded-3xl p-8 bg-slate-50 space-y-8">

                <!-- TOP -->

                <div class="flex items-center justify-between">

                    <div>

                        <h3 class="text-2xl font-bold">
                            Resource Object
                        </h3>

                        <p class="text-slate-500">
                            Educational content attached to this chapter
                        </p>

                    </div>

                    <button type="button"
                        class="px-5 py-3 rounded-2xl bg-red-500 hover:bg-red-600 transition text-white font-semibold">

                        Remove

                    </button>

                </div>

                <!-- GRID -->

                <div class="grid grid-cols-2 gap-8">

                    <!-- RESOURCE TITLE -->

                    <div>

                        <label class="block text-sm font-semibold text-slate-700 mb-3">
                            Resource Title
                        </label>

                        <input type="text" placeholder="Introduction PDF"
                            class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-white focus:outline-none focus:ring-4 focus:ring-blue-100" />

                    </div>

                    <!-- TYPE -->

                    <div>

                        <label class="block text-sm font-semibold text-slate-700 mb-3">
                            Resource Type
                        </label>

                        <select
                            class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-white focus:outline-none focus:ring-4 focus:ring-blue-100">

                            <option>PDF</option>

                            <option>Video</option>

                            <option>Link</option>

                            <option>Document</option>

                            <option>Quiz</option>

                        </select>

                    </div>

                </div>

                <!-- URL -->

                <div>

                    <label class="block text-sm font-semibold text-slate-700 mb-3">
                        Resource URL / File
                    </label>

                    <input type="text" placeholder="https://..."
                        class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-white focus:outline-none focus:ring-4 focus:ring-blue-100" />

                </div>

                <!-- DESCRIPTION -->

                <div>

                    <label class="block text-sm font-semibold text-slate-700 mb-3">
                        Resource Description
                    </label>

                    <textarea rows="4" placeholder="Describe this educational resource..."
                        class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-white resize-none focus:outline-none focus:ring-4 focus:ring-blue-100"></textarea>

                </div>

            </div>

            <!-- ACTIONS -->

            <div class="flex justify-end gap-5 pt-5">

                <button type="button"
                    class="px-8 py-4 rounded-2xl border border-slate-300 hover:bg-slate-100 transition font-semibold">

                    Cancel

                </button>

                <button type="submit"
                    class="px-8 py-4 rounded-2xl bg-blue-600 hover:bg-blue-700 transition text-white font-semibold shadow-lg shadow-blue-100">

                    Create Chapter

                </button>

            </div>

        </form>

    </div>

</main>
