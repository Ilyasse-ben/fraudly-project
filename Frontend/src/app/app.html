@if (!router.url.includes('login') && !router.url.includes('inscription')) {
<div class="flex min-h-screen">
  <div class="flex bg-slate-50">

  <!-- SIDEBAR -->

  <aside class="w-72 bg-white border-r border-slate-200 p-8 fixed left-0 top-0 h-screen flex flex-col">

    <!-- TOP -->

    <div>

      <!-- LOGO -->

      <h1 class="text-3xl font-bold mb-10">
        Fraudly
      </h1>

      <!-- NAVIGATION -->

      <nav class="space-y-2">

        <!-- TEACHER navigation -->
        @if (authService.isProfessor()) {

          <a routerLink="/dashbord" routerLinkActive="bg-blue-50 text-blue-600 font-semibold"
            [routerLinkActiveOptions]="{ exact: true }"
            class="block px-4 py-3 rounded-xl text-slate-600 hover:bg-slate-100 transition duration-300">
            Dashboard
          </a>

          <a routerLink="/listexemen" routerLinkActive="bg-blue-50 text-blue-600 font-semibold"
            class="block px-4 py-3 rounded-xl text-slate-600 hover:bg-slate-100 transition duration-300">
            Exams
          </a>

          <a routerLink="/Allcours" routerLinkActive="bg-blue-50 text-blue-600 font-semibold"
            class="block px-4 py-3 rounded-xl text-slate-600 hover:bg-slate-100 transition duration-300">
            Courses
          </a>

          <a routerLink="/proctoring-review" routerLinkActive="bg-blue-50 text-blue-600 font-semibold"
            class="block px-4 py-3 rounded-xl text-slate-600 hover:bg-slate-100 transition duration-300">
            Proctoring Review
          </a>

          <a routerLink="/assistant" routerLinkActive="bg-blue-50 text-blue-600 font-semibold"
            class="block px-4 py-3 rounded-xl text-slate-600 hover:bg-slate-100 transition duration-300">
            AI Assistant
          </a>

        }

        <!-- STUDENT navigation -->
        @if (authService.isStudent()) {

          <a routerLink="/Allcours" routerLinkActive="bg-blue-50 text-blue-600 font-semibold"
            class="block px-4 py-3 rounded-xl text-slate-600 hover:bg-slate-100 transition duration-300">
            Courses
          </a>

          <a routerLink="/assistant" routerLinkActive="bg-blue-50 text-blue-600 font-semibold"
            class="block px-4 py-3 rounded-xl text-slate-600 hover:bg-slate-100 transition duration-300">
            AI Assistant
          </a>

        }

      </nav>

    </div>

    <!-- USER PROFILE -->

    <div class="mt-auto pt-8 border-t border-slate-200">

      <div class="flex items-center gap-4 mb-5">

        <!-- AVATAR -->

        <div
          class="w-14 h-14 rounded-2xl bg-blue-600 text-white flex items-center justify-center font-bold text-lg shadow-lg shadow-blue-100">
          {{ userInitials }}
        </div>

        <!-- USER INFO -->

        <div>

          <h3 class="font-semibold text-slate-800">
            {{ userName }}
          </h3>

          <p class="text-sm text-slate-500">
            {{ userRole }}
          </p>

        </div>

      </div>

      <!-- LOGOUT -->

      <button
        (click)="logout()"
        class="w-full px-5 py-4 rounded-2xl bg-red-50 hover:bg-red-100 text-red-600 font-semibold transition duration-300">
        Logout
      </button>

    </div>

  </aside>

    <!-- MAIN CONTENT -->


  </div>
    <main class="flex-1 ml-72 w-full overflow-auto">

      <router-outlet></router-outlet>

    </main>
</div>
}
@else {
  <router-outlet></router-outlet>
}
