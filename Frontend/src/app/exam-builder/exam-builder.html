<main class="flex-1 p-12">

  <div class="mb-10">
    <h1 class="text-5xl font-bold mb-3">Create Exam</h1>
    <p class="text-slate-500 text-lg">Configure an AI-generated exam for your course</p>
  </div>

  @if (error) {
    <div class="px-6 py-4 mb-8 rounded-2xl bg-red-50 border border-red-200 text-red-700 font-medium">
      {{ error }}
    </div>
  }

  <form [formGroup]="builderForm" (ngSubmit)="onSubmit()"
        class="bg-white border border-slate-200 rounded-3xl shadow-sm p-10 max-w-3xl space-y-8">

    <!-- Title -->
    <div>
      <label class="block text-sm font-semibold text-slate-600 uppercase tracking-wide mb-2">
        Exam Title <span class="text-red-400">*</span>
      </label>
      <input
        formControlName="title"
        type="text"
        placeholder="e.g., Machine Learning Midterm"
        class="w-full px-4 py-3 rounded-xl border border-slate-200 text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-300" />
    </div>

    <!-- Duration + Difficulty -->
    <div class="grid grid-cols-2 gap-6">
      <div>
        <label class="block text-sm font-semibold text-slate-600 uppercase tracking-wide mb-2">
          Duration (minutes) <span class="text-red-400">*</span>
        </label>
        <input
          formControlName="durationMinutes"
          type="number"
          min="1"
          class="w-full px-4 py-3 rounded-xl border border-slate-200 text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-300" />
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-600 uppercase tracking-wide mb-2">
          Difficulty <span class="text-red-400">*</span>
        </label>
        <select
          formControlName="difficulty"
          class="w-full px-4 py-3 rounded-xl border border-slate-200 text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-300">
          @for (d of difficulties; track d) {
            <option [value]="d">{{ d }}</option>
          }
        </select>
      </div>
    </div>

    <!-- Question counts -->
    <div>
      <p class="text-sm font-semibold text-slate-600 uppercase tracking-wide mb-4">Question Counts</p>
      <div class="grid grid-cols-3 gap-4">
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-2">QCM Questions</label>
          <input
            formControlName="nbQcm"
            type="number"
            min="0"
            class="w-full px-4 py-3 rounded-xl border border-slate-200 text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-300" />
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-2">True / False</label>
          <input
            formControlName="nbTrueFalse"
            type="number"
            min="0"
            class="w-full px-4 py-3 rounded-xl border border-slate-200 text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-300" />
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-500 mb-2">Open Questions</label>
          <input
            formControlName="nbOpen"
            type="number"
            min="0"
            class="w-full px-4 py-3 rounded-xl border border-slate-200 text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-300" />
        </div>
      </div>
    </div>

    <!-- QCM Type -->
    <div>
      <label class="block text-sm font-semibold text-slate-600 uppercase tracking-wide mb-2">
        QCM Type <span class="text-red-400">*</span>
      </label>
      <select
        formControlName="qcmType"
        class="w-full px-4 py-3 rounded-xl border border-slate-200 text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-300">
        @for (t of qcmTypes; track t) {
          <option [value]="t">{{ t }}</option>
        }
      </select>
    </div>

    <!-- Chapter IDs (optional) -->
    <div>
      <label class="block text-sm font-semibold text-slate-600 uppercase tracking-wide mb-2">
        Chapter IDs <span class="text-slate-400 font-normal normal-case">(optional — comma-separated)</span>
      </label>
      <input
        formControlName="chapterIds"
        type="text"
        placeholder="e.g., uuid-1, uuid-2"
        class="w-full px-4 py-3 rounded-xl border border-slate-200 text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-300" />
    </div>

    <!-- Submit -->
    <button
      type="submit"
      [disabled]="builderForm.invalid || loading"
      class="w-full py-4 rounded-2xl bg-blue-600 hover:bg-blue-700 text-white font-bold text-base transition disabled:opacity-50 disabled:cursor-not-allowed">
      {{ loading ? 'Creating Exam...' : 'Create Exam' }}
    </button>

  </form>

</main>
