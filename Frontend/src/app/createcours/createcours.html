<div class=" px-20 py-10">
    <!-- PAGE HEADER -->

    <div class="mb-10">

        <h1 class="text-5xl font-bold mb-3">
            Create New Course
        </h1>

        <p class="text-slate-500 text-lg">
            Create and manage educational content for your students
        </p>

    </div>

    <!-- FORM CARD -->

    <div class="bg-white border border-slate-200 rounded-3xl p-10 max-w-5xl">

        <form class="space-y-8">

            <!-- COURSE TITLE -->

            <div>

                <label class="block text-sm font-semibold text-slate-700 mb-3">
                    Course Title
                </label>

                <input type="text" placeholder="Example: Machine Learning"
                    class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50 focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition" />

            </div>

            <!-- COURSE DESCRIPTION -->

            <div>

                <label class="block text-sm font-semibold text-slate-700 mb-3">
                    Course Description
                </label>

                <textarea rows="5" placeholder="Describe your course..."
                    class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50 focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition resize-none"></textarea>

            </div>

            <!-- ACTIONS -->

            <div class="flex justify-end gap-5 pt-5">

                <button type="button"
                    class="px-8 py-4 rounded-2xl border border-slate-300 hover:bg-slate-100 transition font-semibold">

                    Cancel

                </button>

                <button type="submit"
                    class="px-8 py-4 rounded-2xl bg-blue-600 hover:bg-blue-700 transition text-white font-semibold shadow-lg shadow-blue-100">

                    Create Course

                </button>

            </div>

        </form>

    </div>

</div>
