<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fraudly - Sign Up</title>

    <!-- Tailwind CSS -->

    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>

</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center p-6">

    <!-- MAIN CARD -->

    <div class="w-full max-w-5xl bg-white rounded-[35px] overflow-hidden shadow-xl grid grid-cols-2">

        <!-- LEFT SIDE -->

        <div class="bg-blue-600 p-14 text-white flex flex-col justify-center">

            <h1 class="text-5xl font-bold mb-6">
                Fraudly
            </h1>

            <p class="text-blue-100 text-lg leading-8 mb-10">
                Join the next generation educational platform powered by AI.
            </p>

            <!-- FEATURES -->

            <div class="space-y-5">

                <div class="flex items-center gap-4">

                    <div class="w-12 h-12 rounded-2xl bg-white/20 flex items-center justify-center">
                        🎓
                    </div>

                    <span class="text-lg">
                        Smart Learning Experience
                    </span>

                </div>

                <div class="flex items-center gap-4">

                    <div class="w-12 h-12 rounded-2xl bg-white/20 flex items-center justify-center">
                        🤖
                    </div>

                    <span class="text-lg">
                        AI Educational Assistant
                    </span>

                </div>

                <div class="flex items-center gap-4">

                    <div class="w-12 h-12 rounded-2xl bg-white/20 flex items-center justify-center">
                        🔒
                    </div>

                    <span class="text-lg">
                        Secure Online Examinations
                    </span>

                </div>

            </div>

        </div>

        <!-- RIGHT SIDE -->

        <div class="p-14 flex flex-col justify-center">

            <!-- HEADER -->

            <div class="mb-10">

                <h2 class="text-4xl font-bold mb-3">
                    Create Account
                </h2>

                <p class="text-slate-500 text-lg">
                    Start your intelligent learning journey
                </p>

            </div>

            <!-- FORM -->

            <form class="space-y-6">

                <!-- FULL NAME -->

                <div>

                    <label class="block text-sm font-semibold mb-3">
                        Full Name
                    </label>

                    <input type="text" placeholder="Enter your full name"
                        class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50 focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition" />

                </div>

                <!-- EMAIL -->

                <div>

                    <label class="block text-sm font-semibold mb-3">
                        Email Address
                    </label>

                    <input type="email" placeholder="Enter your email"
                        class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50 focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition" />

                </div>

                <!-- ROLE -->

                <div>

                    <label class="block text-sm font-semibold mb-3">
                        Account Type
                    </label>

                    <select
                        class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50 focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition">

                        <option>Student</option>

                        <option>Professor</option>

                        <option>Administrator</option>

                    </select>

                </div>

                <!-- PASSWORD -->

                <div>

                    <label class="block text-sm font-semibold mb-3">
                        Password
                    </label>

                    <input type="password" placeholder="Create your password"
                        class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50 focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition" />

                </div>

                <!-- CONFIRM PASSWORD -->

                <div>

                    <label class="block text-sm font-semibold mb-3">
                        Confirm Password
                    </label>

                    <input type="password" placeholder="Confirm your password"
                        class="w-full px-5 py-4 rounded-2xl border border-slate-200 bg-slate-50 focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-500 transition" />

                </div>

                <!-- TERMS -->

                <label class="flex items-center gap-3 text-sm text-slate-500">

                    <input type="checkbox">

                    I agree to the Terms and Conditions

                </label>

                <!-- BUTTON -->

                <button type="submit"
                    class="w-full py-5 rounded-2xl bg-blue-600 hover:bg-blue-700 transition duration-300 text-white font-semibold text-lg shadow-lg shadow-blue-100">

                    Create Account

                </button>

                <!-- FOOTER -->

                <p class="text-center text-slate-500 pt-4">

                    Already have an account?

                    <a href="#" class="text-blue-600 font-semibold hover:text-blue-700 transition">

                        Sign In

                    </a>

                </p>

            </form>

        </div>

    </div>

</body>

</html>
