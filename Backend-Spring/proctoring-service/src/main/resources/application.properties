spring.application.name=proctoring-service
# Database (allow overrides)
# PostgreSQL (docker-friendly defaults)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/fraudly_proctoring}
spring.datasource.username=${DB_USER_PROCTORING:fraudly}
spring.datasource.password=${DB_PASSWORD_PROCTORING:fraudly}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Server port (overridable)
server.port=${SERVER_PORT:8085}

# Kafka (use internal kafka service by default)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
spring.kafka.consumer.group-id=${KAFKA_GROUP_ID:fraudly-proctoring-service}
spring.kafka.consumer.auto-offset-reset=${KAFKA_AUTO_OFFSET_RESET:earliest}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Kafka Topics
kafka.topic.collusion.suspected=${KAFKA_TOPIC_COLLUSION_SUSPECTED:proctor.collusion_suspected}

jwt.secret=${JWT_SECRET:GvTnEQ/hiviPhCkcPdrsoCVWKQyvRLGHGmqvwwDExlQ=}
jwt.expiration=${JWT_EXPIRATION:900000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}
springdoc.data-rest.enabled=false

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
