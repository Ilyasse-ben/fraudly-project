spring.application.name=proctoring-service

# Database Configuration
spring.datasource.url=${DB_URL_PROCTORING}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Server Port (Mapped via Docker Compose)
server.port=${SERVER_PORT:8085}

# Kafka Configuration
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.consumer.group-id=${KAFKA_GROUP_ID:fraudly-proctoring-service}
spring.kafka.consumer.auto-offset-reset=${KAFKA_AUTO_OFFSET_RESET:earliest}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Kafka Topics
kafka.topic.fraud.events=${KAFKA_TOPIC_COLLUSION_SUSPECTED}
kafka.topic.fraud.flagged=${KAFKA_TOPIC_COLLUSION_SUSPECTED}

# Fraud threshold
proctoring.fraud.score.threshold=80

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION}

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_ZONE:http://discovery-service:8761/eureka/}
eureka.instance.prefer-ip-address=true

# --- Redis Configuration ---
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
# If you are using Spring Session or Caching, ensure this is enabled
spring.data.redis.timeout=6000

# SpringDoc OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.enabled=true