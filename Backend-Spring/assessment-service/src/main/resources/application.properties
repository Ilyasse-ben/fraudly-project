spring.application.name=assessment-service

# Database Configuration
spring.datasource.url=${DB_URL_ASSESSMENT}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Server
server.port=${SERVER_PORT:8082}

# AI Service
ai.service.url=${AI_SERVICE_URL}/assessment

# Kafka Configuration
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.consumer.group-id=fraudly-assessment-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Kafka Topics
kafka.topic.exam.correction.requested=${KAFKA_TOPIC_CORRECTION}
kafka.topic.exam.scored=${KAFKA_TOPIC_SCORED}
kafka.topic.collusion.suspected=${KAFKA_TOPIC_COLLUSION_SUSPECTED}

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION}

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_ZONE:http://discovery-service:8761/eureka/}
eureka.instance.prefer-ip-address=true