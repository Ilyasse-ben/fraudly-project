spring.application.name=assessment-service

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/fraudly_assessment}
spring.datasource.username=${DB_USER:fraudly}
spring.datasource.password=${DB_PASSWORD:fraudly}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=8082
ai.service.url=${AI_SERVICE_URL:http://localhost:8000/assessment}

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
spring.kafka.consumer.group-id=fraudly-assessment-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Kafka Topics
kafka.topic.exam.correction.requested=exam.correction.requested
kafka.topic.exam.scored=exam.scored
kafka.topic.collusion.suspected=proctor.collusion_suspected

jwt.secret=${JWT_SECRET:GvTnEQ/hiviPhCkcPdrsoCVWKQyvRLGHGmqvwwDExlQ=}
jwt.expiration=${JWT_EXPIRATION:900000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}
springdoc.data-rest.enabled=false

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true