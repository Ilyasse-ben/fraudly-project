spring.application.name=authentification-service
# Use 'optional:classpath' instead of 'file' if the .env is bundled in the JAR,
# but keep 'file' if you are mounting it from outside the container
spring.config.import=optional:classpath:.env[.properties]

# Database Configuration
spring.datasource.url=${DB_URL_AUTH}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA (Hibernate 6 detects dialect automatically)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT & Security
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION}

# Internal API Secret
internal.api.secret=${INTERNAL_API_SECRET:fraudly-internal-secret}

# Server port (Ensure this matches the SERVER_PORT assigned in docker-compose)
server.port=${SERVER_PORT:8081}

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_ZONE:http://discovery-service:8761/eureka/}
eureka.instance.prefer-ip-address=true