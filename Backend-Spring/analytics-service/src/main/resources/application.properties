spring.application.name=analytics-service

# 1. On importe les secrets depuis AWS Secrets Manager
spring.config.import=aws-secretsmanager:fraudly/analytics-service

# PostgreSQL (docker-friendly defaults)
spring.datasource.url=${DB_URL_ANALYTICS:jdbc:postgresql://pgdb:5432/fraudly_analytics}
spring.datasource.username=${DB_USER_ANALYTICS:fraudly}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Server port (overridable)
server.port=${SERVER_PORT:8081}

# Kafka (use internal kafka service by default)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP:fraudly-analytics-service}
spring.kafka.consumer.auto-offset-reset=${KAFKA_AUTO_OFFSET_RESET:earliest}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Kafka Topics (env-overridable)
kafka.topic.tutor.interaction=${KAFKA_TOPIC_TUTOR_INTERACTION:tutor.interaction_logged}
kafka.topic.student.progress=${KAFKA_TOPIC_STUDENT_PROGRESS:student.progress_updated}