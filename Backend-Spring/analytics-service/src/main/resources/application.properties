spring.application.name=analytics-service

# PostgreSQL
spring.datasource.url=${DB_URL_ANALYTICS:jdbc:postgresql://localhost:5432/fraudly_analytics}
spring.datasource.username=${DB_USER_ANALYTICS:fraudly}
spring.datasource.password=${DB_PASSWORD_ANALYTICS:fraudly}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=8081

# Kafka
spring.kafka.bootstrap-servers=localhost:9094
spring.kafka.consumer.group-id=fraudly-analytics-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Kafka Topics
kafka.topic.tutor.interaction=tutor.interaction_logged
kafka.topic.student.progress=student.progress_updated