spring.application.name=analytics-service

# PostgreSQL (docker-friendly defaults)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/fraudly_analytics}
spring.datasource.username=${DB_USER_ANALYTICS:fraudly}
spring.datasource.password=${DB_PASSWORD_ANALYTICS:fraudly}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Server port (overridable)
server.port=${SERVER_PORT:8083}

# Kafka (use internal kafka service by default)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP:fraudly-analytics-service}
spring.kafka.consumer.auto-offset-reset=${KAFKA_AUTO_OFFSET_RESET:earliest}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Kafka Topics (env-overridable)
kafka.topic.tutor.interaction=${KAFKA_TOPIC_TUTOR_INTERACTION:tutor.interaction_logged}
kafka.topic.student.progress=${KAFKA_TOPIC_STUDENT_PROGRESS:student.progress_updated}

jwt.secret=${JWT_SECRET:GvTnEQ/hiviPhCkcPdrsoCVWKQyvRLGHGmqvwwDExlQ=}
jwt.expiration=${JWT_EXPIRATION:900000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}
springdoc.data-rest.enabled=false

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true