spring.application.name=learning-service

# Server port (overridable for docker)
server.port=${SERVER_PORT:8084}

# Database (PostgreSQL, docker-friendly defaults)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/fraudly_learning}
spring.datasource.username=${DB_USER:fraudly}
spring.datasource.password=${DB_PASSWORD:fraudly}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.cloud.config.enabled=false
spring.cloud.discovery.enabled=false
spring.cloud.openfeign.circuitbreaker.enabled=true

# Kafka (use internal kafka service by default)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9094}
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP:fraudly-learning-service}
spring.kafka.consumer.auto-offset-reset=${KAFKA_AUTO_OFFSET_RESET:earliest}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
KAFKA_TOPIC_AI_RESULTS=ai_results

# JWT Configuration
jwt.secret=${JWT_SECRET:GvTnEQ/hiviPhCkcPdrsoCVWKQyvRLGHGmqvwwDExlQ=}
jwt.expiration=${JWT_EXPIRATION:900000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# Auth service sync client
services.auth.base-url=${AUTH_SERVICE_URL:http://localhost:8081}
services.auth.internal-secret=${INTERNAL_API_SECRET:fraudly-internal-secret}

# Redis cache
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Disable springdoc Data REST scanning to avoid Sort->OpenAPI NPE
springdoc.data-rest.enabled=false

# AWS Credentials 
aws.accessKey=
aws.secretKey=
aws.sessionToken=
aws.region=us-east-1
aws.bucketName=test-s3-learning

# Tutor AI
ai.service.url=http://localhost:8000