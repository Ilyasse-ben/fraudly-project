spring.application.name=learning-service
server.port=8084
# PostgreSQL (use docker service-name defaults)
spring.datasource.url=jdbc:postgresql://pgdb:5432/nom_de_ta_db
spring.datasource.username=fraudly
spring.datasource.password=fraudly
spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# config microService
eureka.client.service-url.defaultZone=http://discavery-service:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
spring.cloud.config.enabled=false

# Kafka (use internal kafka service by default)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.consumer.group-id=${KAFKA_GROUP_ID:fraudly-proctoring-service}
spring.kafka.consumer.auto-offset-reset=${KAFKA_AUTO_OFFSET_RESET:earliest}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Kafka Topics
kafka.topic.collusion.suspected=${KAFKA_TOPIC_COLLUSION_SUSPECTED:proctor.collusion_suspected}

# AWS Credentials
aws.accessKey=
aws.secretKey=
aws.sessionToken=
aws.region=us-east-1
aws.bucketName=test-s3-lerning
