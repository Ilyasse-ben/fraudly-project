spring.application.name=learning-service
spring.config.import=optional:file:.env[.properties]

# Server port
server.port=${SERVER_PORT}

# Database Configuration
spring.datasource.url=${DB_URL_LEARNING}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Spring Cloud
spring.cloud.config.enabled=false
spring.cloud.discovery.enabled=true
spring.cloud.openfeign.circuitbreaker.enabled=true

# Kafka Configuration
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP_LEARNING}
spring.kafka.consumer.auto-offset-reset=${KAFKA_AUTO_OFFSET_RESET}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
kafka.topic.ai.results=${KAFKA_TOPIC_AI_RESULTS}

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION}

# Auth service sync client
services.auth.base-url=${AUTH_SERVICE_URL}
services.auth.internal-secret=${INTERNAL_API_SECRET}

# Redis cache
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}

# Disable springdoc Data REST scanning
springdoc.data-rest.enabled=false

# AWS Credentials
aws.accessKey=${AWS_ACCESS_KEY}
aws.secretKey=${AWS_SECRET_KEY}
aws.sessionToken=${AWS_SESSION_TOKEN}
aws.region=${AWS_REGION}
aws.bucketName=${AWS_BUCKET_NAME}

# Tutor AI
ai.service.url=${AI_SERVICE_URL}

# Eureka Discovery
eureka.client.service-url.defaultZone=${EUREKA_ZONE}
eureka.instance.prefer-ip-address=true