spring.application.name=proctoring-service
# Database (allow overrides)
spring.datasource.url=${DB_URL_proctoring:jdbc:h2:mem:testdb}
spring.datasource.driverClassName=${DB_DRIVER_proctoring:org.h2.Driver}
spring.datasource.username=${DB_USER_proctoring:sa}
spring.datasource.password=${DB_PASSWORD_proctoring:}
spring.jpa.database-platform=${DB_DIALECT_proctoring:org.hibernate.dialect.H2Dialect}
# Enable H2 console
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Server port (overridable)
server.port=${SERVER_PORT:8080}
# H2 network settings
spring.h2.console.settings.web-allow-others=true

# Kafka (use internal kafka service by default)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.consumer.group-id=${KAFKA_GROUP_ID:fraudly-proctoring-service}
spring.kafka.consumer.auto-offset-reset=${KAFKA_AUTO_OFFSET_RESET:earliest}
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Kafka Topics
kafka.topic.collusion.suspected=${KAFKA_TOPIC_COLLUSION_SUSPECTED:proctor.collusion_suspected}
